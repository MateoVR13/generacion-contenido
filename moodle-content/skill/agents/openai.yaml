interface:
  display_name: "Moodle Content (envoltura)"
  short_description: "JSON de la envoltura Moodle por metodología"
  default_prompt: "Use $moodle-content to generate the validated `moodle`-rooted JSON that feeds the moodle-content template renderer for the institutional Moodle wrapper of a virtual asignatura, from a syllabus (PDF or text) plus a written methodology (AG, ABPr, ABI, ABR, or ABC): a welcome page (hero, learning outcomes, start activities, roadmap, course-at-a-glance, support resources), one moment page per methodology moment (moment banner, intro+video, SCORM link, practice link, APA complementary material) and a closing page (synthesis, next steps, optional final evaluation). Produce JSON only (never HTML; the renderer emits inline-styled pasteable HTML), adapt the moment count and label to the methodology (AG = 7 'Contenido' pages, ABPr = 3, ABI/ABR/ABC = 4 'Momento' pages with the official UA moment names), extract learning outcomes/APA references/moments from the syllabus, reuse the SCORM skill `subject` JSON when present, never invent video/SCORM/syllabus/practice URLs (leave empty fields with clear TODO placeholders), keep the unified UA brand inline-only, and validate the result with scripts/validate_moodle_json.js."
